<style>
* { box-sizing: border-box; }
body { margin: 0; background: #D5D3CF; font-family: 'Barlow', sans-serif; }
.dv-turn { padding: 44px 48px 60px; }
.dv-thd { display: flex; align-items: baseline; gap: 12px; margin: 0 0 6px; }
.dv-tid { font: 700 11px 'Barlow Condensed', sans-serif; letter-spacing: 0.06em; padding: 3px 9px; background: #1A1917; color: #FAFAF8; border-radius: 5px; text-decoration: none; }
.dv-tname { font: 600 14px 'Barlow', sans-serif; color: #1A1917; }
.dv-sub { font-size: 12.5px; color: #6b6560; margin: 0 0 26px; max-width: 640px; line-height: 1.55; }
.dv-opts { display: flex; flex-direction: column; gap: 36px; align-items: flex-start; }
.dv-opt { flex: none; display: flex; flex-direction: column; gap: 10px; scroll-margin-top: 16px; width: 900px; }
.dv-oid { font: 700 10.5px 'Barlow Condensed', sans-serif; letter-spacing: 0.06em; padding: 3px 8px; background: rgba(26,25,23,0.09); color: #1A1917; border-radius: 5px; text-decoration: none; }
.dv-olabel { display: flex; align-items: baseline; gap: 8px; font-size: 11.5px; line-height: 1.4; color: #6b6560; }
.dv-card { background: #FAFAF8; border-radius: 18px; box-shadow: 0 3px 26px rgba(0,0,0,0.12); overflow: hidden; }
.dv-opt:target .dv-oid { background: #16A34A; color: #fff; }
.dv-next { margin: 30px 0 0; font-size: 12px; line-height: 1.6; color: #6b6560; max-width: 640px; }
</style>
</helmet>
